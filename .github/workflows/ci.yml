name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    name: Organization policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify security baseline
        run: test -f SECURITY.md && test -f SECURITY_BASELINE.md
