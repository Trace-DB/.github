name: Bug report
description: Report a reproducible problem in a public TraceDB repo.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public distribution issues. Do not include secrets,
        hosted-service credentials, private endpoints, or operator logs.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, code, or steps that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, TraceDB version/commit, SDK version, and relevant runtime versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste only non-sensitive public distribution logs.
      render: shell

