name: Feature request
description: Propose a public distribution, SDK, protocol, docs, or examples improvement.
title: "[feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What user workflow or integration does this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior, API, doc, or example you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core database
        - HTTP API or protocol
        - SDK
        - Examples
        - RFC or design process
        - Documentation
    validations:
      required: true

